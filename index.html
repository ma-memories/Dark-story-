<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Story - Patient 14</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Changa:wght@300;500;700&family=Special+Elite&display=swap');

        :root { --bg-color: #050505; --text-main: #d4d4d4; --blood-red: #8b0000; --paper-color: #e3dac9; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { background-color: var(--bg-color); color: var(--text-main); font-family: 'Changa', sans-serif; overflow-x: hidden; }

        /* تأثير البلور الأسود */
        .black-blur { filter: blur(8px) brightness(0.15) grayscale(0.8); transition: filter 3s ease-in-out; pointer-events: none; }

        /* الهيكل العظمي */
        #skeleton-video { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9990; width: 400px; opacity: 0; transition: opacity 1.5s ease-in-out; pointer-events: none; }
        #skeleton-video.visible { opacity: 1; }

        /* الأقسام والتنسيقات */
        #intro-screen { position: fixed; top:0; left:0; width:100%; height:100vh; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .enter-btn { padding: 15px 40px; background: transparent; border: 1px solid var(--blood-red); color: var(--blood-red); cursor: pointer; font-size: 1.2em; transition: 0.3s; }
        .enter-btn:hover { background: var(--blood-red); color: #fff; }
        
        .cover-section, .investigation-room, .evidence-section { min-height: 100vh; padding: 100px 20px; transition: all 2s; }
        .transcript-paper { max-width: 900px; margin: 0 auto; background-color: var(--paper-color); padding: 60px; color: #222; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        
        .photo-card { width: 280px; background: #fff; padding: 10px; cursor: pointer; transition: transform 0.1s; }
        .photo-card img { width: 100%; height: 300px; object-fit: cover; filter: grayscale(80%); }
        
        .lightbox-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .lightbox-overlay.active { display: flex; }

        .finale-section { height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; }
        .finale-text { color: #fff; font-size: 2.5em; opacity: 0; }
        .heartbeat { animation: heartbeat 1.5s infinite; }
        @keyframes heartbeat { 0%, 20%, 40% { transform: scale(1); } 10%, 30% { transform: scale(1.05); } }
    </style>
</head>
<body>

    <audio id="finale-music" src="Frank Sinatra - Fly Me To The Moon (Audio) ft. Count Basie And His Orchestra(MP3_160K).mp3" preload="auto"></audio>

    <video id="skeleton-video" muted loop playsinline>
        <source src="skeleton-smoking.mp4" type="video/mp4">
    </video>

    <div class="lightbox-overlay" id="lightbox" onclick="this.classList.remove('active')">
        <img id="lightbox-img" src="" style="max-width:90%;">
    </div>

    <div id="intro-screen">
        <button class="enter-btn" onclick="startExperience()">ابدأ الجلسة</button>
    </div>

    <section class="cover-section" id="cover">
        <h1 style="text-align:center; color:#fff;">CONFIDENTIAL - PATIENT 14</h1>
    </section>

    <section class="investigation-room" id="investigation">
        <div class="transcript-paper">
            <h2>التحقيق في ملف علي صقر</h2>
            <p style="margin-top:20px; line-height:2;">هنا نصوص الحوار كاملة كما كانت في الموقع الأصلي...</p>
        </div>
    </section>

    <section class="evidence-section" id="evidence">
        <div style="display:flex; justify-content:center; gap:20px;">
            <div class="photo-card" onclick="openLightbox('img1.jpg')"><img src="forearm-snake.png"></div>
            <div class="photo-card" onclick="openLightbox('img2.jpg')"><img src="forearm-roman.png"></div>
        </div>
    </section>

    <section class="finale-section" id="finale">
        <div class="finale-text" id="typewriter-text"></div>
    </section>

    <script>
        function startExperience() { document.getElementById('intro-screen').style.display = 'none'; }
        
        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').classList.add('active');
        }

        function triggerFinaleMadness() {
            document.documentElement.style.scrollBehavior = 'auto';
            window.scrollTo(0, 0);
            document.getElementById('finale-music').play();

            setTimeout(() => {
                document.getElementById('cover').classList.add('black-blur');
                document.getElementById('investigation').classList.add('black-blur');
                document.getElementById('evidence').classList.add('black-blur');

                const video = document.getElementById('skeleton-video');
                video.play();
                video.classList.add('visible');

                function autoScrollDown() {
                    window.scrollBy(0, 1.5);
                    if (document.getElementById('finale').getBoundingClientRect().top < window.innerHeight / 1.5) {
                        video.classList.remove('visible');
                    }
                    if ((window.innerHeight + window.scrollY) < document.body.offsetHeight) {
                        requestAnimationFrame(autoScrollDown);
                    }
                }
                autoScrollDown();
            }, 500);
        }

        setTimeout(() => {
            const textElement = document.getElementById('typewriter-text');
            textElement.style.opacity = '1';
            textElement.innerHTML = '"وفي النهاية.. كان معكم المريض النفسي.. وشكراً."';
            textElement.classList.add('heartbeat');
            triggerFinaleMadness();
        }, 3000);
    </script>
</body>
</html>
