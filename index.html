<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الولادة الجديدة — علي صقر</title>
    <style>
        /* CSS Reset & Dark Gothic Theme */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #050505;
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Screen 1: Intro Warning */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease;
            padding: 20px;
            text-align: center;
        }

        .warning-text {
            font-size: 1.5rem;
            color: #aa2222;
            margin-bottom: 30px;
            letter-spacing: 2px;
            min-height: 50px;
            border-right: 2px solid #aa2222;
            white-space: nowrap;
            overflow: hidden;
        }

        .enter-btn {
            background: transparent;
            border: 1px solid #444;
            color: #888;
            padding: 10px 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.4s ease;
            opacity: 0;
            text-transform: uppercase;
        }

        .enter-btn.show {
            opacity: 1;
        }

        .enter-btn:hover {
            color: #fff;
            border-color: #ff3b30;
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.4);
        }

        /* Main Story Theater Wrapper */
        #theater-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1.5s ease;
            position: relative;
        }

        /* The Burnt Ancient Book */
        .book {
            width: 90%;
            max-width: 950px;
            height: 85vh;
            background: #121110;
            border: 4px solid #1c1a18;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9), inset 0 0 100px rgba(0,0,0,0.8);
            border-radius: 4px;
            position: relative;
            display: flex;
            overflow: hidden;
        }

        /* Burnt & Ash Edges Effect */
        .book::before {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            pointer-events: none;
            box-shadow: inset 0 0 40px #000, inset 15px 15px 30px rgba(27, 20, 16, 0.7), inset -15px -15px 30px rgba(27, 20, 16, 0.7);
            z-index: 10;
        }

        /* Pages Canvas split into Graphics (Left) and Dialogues (Right) */
        .page-half {
            width: 50%;
            height: 100%;
            position: relative;
            padding: 30px;
            display: flex;
            flex-direction: column;
            transition: all 0.6s ease-in-out;
        }

        .visual-side {
            background: #0f0e0d;
            border-left: 1px solid #1f1d1b;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .text-side {
            background: #141312;
            justify-content: flex-end;
        }

        /* Scene Layouts Styles */
        /* Scene 1: Therapy Circle */
        .therapy-circle-bg {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.08) 0%, rgba(0,0,0,0.9) 70%);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .silhouette-group {
            position: absolute;
            width: 80%;
            height: 60%;
            border-radius: 50%;
            border: 1px dashed rgba(255,255,255,0.03);
        }

        .doctor-shadow {
            position: absolute;
            top: 15%;
            left: 20%;
            width: 50px;
            height: 90px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50% 50% 0 0;
            box-shadow: 0 0 15px rgba(255,255,255,0.1), inset 0 0 20px rgba(255,255,255,0.8); /* Doctor white coat hint */
            filter: blur(1px);
        }
        
        .doctor-shadow::after {
            content: '👓';
            position: absolute;
            top: 10px; left: 15px;
            font-size: 10px;
            opacity: 0.6;
        }

        .other-shadows {
            position: absolute;
            width: 40px; height: 70px;
            background: #050505;
            border-radius: 50% 50% 0 0;
            opacity: 0.4;
            filter: blur(2px);
        }

        .hero-spotlight {
            width: 70px;
            height: 110px;
            background: rgba(255,255,255,0.05);
            border-radius: 50% 50% 0 0;
            box-shadow: 0 -20px 40px rgba(255,255,255,0.15);
            z-index: 2;
            position: relative;
            border-bottom: 2px solid rgba(255,255,255,0.2);
        }

        /* Tattoo Mockup Engine */
        .body-canvas {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .body-canvas.active {
            opacity: 1;
            transform: scale(1);
        }

        .tattoo-card {
            border: 1px dashed rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 85%;
        }

        .tattoo-location {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        .tattoo-design {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 1px;
            line-height: 1.6;
        }

        .highlight-red {
            color: #ff3b30;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,59,48,0.6);
        }

        /* Specific Tattoo Illustrations via CSS */
        .eyes-sketch {
            width: 140px;
            height: 45px;
            margin: 15px auto;
            border-top: 1px solid rgba(255,255,255,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .eyes-sketch::before, .eyes-sketch::after {
            content: '';
            width: 20px; height: 20px;
            border: 1px solid #fff;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 20%, transparent 60%);
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
        }

        .snake-wrap {
            width: 60px;
            height: 120px;
            margin: 10px auto;
            border-left: 2px dashed rgba(255,255,255,0.4);
            position: relative;
        }
        .snake-wrap::before {
            content: '🐍';
            font-size: 2.2rem;
            position: absolute;
            top: 10px; left: -15px;
            animation: slither 3s ease-in-out infinite alternate;
        }

        @keyframes slither {
            0% { transform: translateY(0) rotate(-5deg); }
            100% { transform: translateY(20px) rotate(5deg); }
        }

        /* Scene: The Empty Room (Final) */
        .empty-room-bg {
            width: 100%; height: 100%;
            background: #050505;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .spotlight-chair {
            width: 100px; height: 150px;
            background: radial-gradient(ellipse at bottom, rgba(255,255,255,0.06) 0%, transparent 70%);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }
        .chair-silhouette {
            width: 45px; height: 50px;
            border: 2px solid rgba(255,255,255,0.15);
            border-bottom: none;
            position: relative;
        }
        .chair-silhouette::after {
            content: '';
            position: absolute;
            top: -20px; left: 5px;
            width: 31px; height: 20px;
            border: 2px solid rgba(255,255,255,0.15);
        }
        .tshirt-thrown {
            position: absolute;
            bottom: 15px;
            width: 35px; height: 35px;
            background: rgba(255,255,255,0.25);
            border-radius: 4px;
            transform: rotate(-15deg);
            filter: blur(0.5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Dialogue Comic Bubbles Container */
        .dialogue-stream {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow-y: auto;
            padding-bottom: 80px;
            scrollbar-width: none;
        }
        .dialogue-stream::-webkit-scrollbar { display: none; }

        .bubble {
            max-width: 85%;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            line-height: 1.5;
            font-size: 1rem;
            position: relative;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.5s ease;
        }

        .bubble.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        /* Doctor Bubble Style */
        .bubble.doctor {
            background: #1c1b1a;
            color: #b0aeb3;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #292725;
        }

        /* Ali Bubble Style */
        .bubble.ali {
            background: #242220;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            border: 1px solid #33302d;
        }
        
        /* Mother Bubble Style */
        .bubble.mother {
            background: #1a221c;
            color: #a3c2a8;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #233026;
            font-weight: bold;
        }

        .speaker-name {
            font-size: 0.7rem;
            color: #777;
            margin-bottom: 5px;
            display: block;
            letter-spacing: 1px;
        }
        .ali .speaker-name { color: #ff3b30; }
        .doctor .speaker-name { color: #aaa; }
        .mother .speaker-name { color: #4cd964; }

        /* Action Footer Panel */
        .footer-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(transparent, #141312 60%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 5;
        }

        .chapter-indicator {
            font-size: 0.8rem;
            color: #555;
            letter-spacing: 1px;
        }

        .action-click-zone {
            background: #1f1d1c;
            border: 1px solid #333;
            color: #aaa;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .action-click-zone:hover {
            color: #fff;
            background: #ff3b30;
            border-color: #ff3b30;
        }

        /* Page Turn Animation Triggers */
        .page-flip-active .visual-side {
            transform: rotateY(-15deg) scaleX(0.9);
            opacity: 0.3;
            filter: brightness(0.2);
        }
        .page-flip-active .text-side {
            transform: rotateY(15deg) scaleX(0.9);
            opacity: 0.3;
            filter: brightness(0.2);
        }

        /* Final Masterpiece Typography Screen */
        .outro-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s ease;
            padding: 40px;
            text-align: center;
        }
        .outro-screen.active {
            opacity: 1;
            pointer-events: auto;
        }
        .outro-text {
            max-width: 650px;
            font-size: 1.35rem;
            line-height: 2;
            color: #bbb;
            margin-bottom: 40px;
        }
        .outro-signoff {
            font-size: 0.9rem;
            color: #555;
            letter-spacing: 2px;
            margin-top: 20px;
        }

        /* Utilities */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- SECTION 1: CINEMATIC INTRO -->
    <div id="intro-screen">
        <div class="warning-text" id="typewriter-intro"></div>
        <button class="enter-btn" id="enter-story-btn">افتح كتاب الولادة الجديدة</button>
    </div>

    <!-- SECTION 2: INTERACTIVE THEATER BOOK -->
    <div id="theater-container">
        <div class="book" id="main-book">
            
            <!-- LEFT HALF: THE VISUAL CANVAS -->
            <div class="page-half visual-side" id="visual-canvas">
                <!-- Dynamic Content Injected via JS -->
                <div class="therapy-circle-bg" id="base-scene">
                    <div class="silhouette-group" id="shadows-container"></div>
                    <div class="doctor-shadow"></div>
                    <div class="hero-spotlight"></div>
                </div>
            </div>

            <!-- RIGHT HALF: THE DIALOGUE AND TEXT -->
            <div class="page-half text-side">
                <div class="dialogue-stream" id="dialogue-box">
                    <!-- Comic Speech Bubbles Go Here -->
                </div>

                <!-- Footer Controllers -->
                <div class="footer-controls">
                    <span class="chapter-indicator" id="chapter-label">الفصل الأول — الجلسة النفسية</span>
                    <button class="action-click-zone" id="next-trigger">
                        <span>اضغط للاستمرار</span>
                        <span>⏱️</span>
                    </button>
                </div>
            </div>

        </div>

        <!-- FINAL CANVAS OVERLAY: OUTRO SCREEN -->
        <div class="outro-screen" id="master-outro">
            <div class="outro-text" id="final-philosophy"></div>
            <div class="outro-signoff" id="final-signature" style="opacity:0; transition: opacity 1.5s;">النهاية • END</div>
        </div>
    </div>

    <!-- JAVASCRIPT: THE SCRIPT ENGINE -->
    <script>
        // Intro Text Configuration
        const introTextString = "هذه القصة مأخوذة من واقع تجربة أليمة.. لا تحكم على الحبر، احكم على الوجع.";
        let introIdx = 0;

        function typeIntro() {
            if (introIdx < introTextString.length) {
                document.getElementById("typewriter-intro").innerHTML += introTextString.charAt(introIdx);
                introIdx++;
                setTimeout(typeIntro, 70);
            } else {
                document.getElementById("enter-story-btn").classList.add("show");
            }
        }

        // Trigger Intro on load
        window.addEventListener("DOMContentLoaded", () => {
            setTimeout(typeIntro, 500);
            buildTherapyShadows();
        });

        // Initialize Background Scene Shadows
        function buildTherapyShadows() {
            const container = document.getElementById("shadows-container");
            const count = 6;
            for(let i=0; i<count; i++) {
                const shadow = document.createElement("div");
                shadow.className = "other-shadows";
                // Distribute in circle roughly
                const angle = (i * (360/count)) * (Math.PI/180);
                const x = 50 + 35 * Math.cos(angle);
                const y = 50 + 35 * Math.sin(angle);
                shadow.style.left = `${x}%`;
                shadow.style.top = `${y}%`;
                container.appendChild(shadow);
            }
        }

        // Enter Event
        document.getElementById("enter-story-btn").addEventListener("click", () => {
            document.getElementById("intro-screen").style.opacity = "0";
            setTimeout(() => {
                document.getElementById("intro-screen").classList.add("hidden");
                document.getElementById("theater-container").style.opacity = "1";
                renderDialogueStep();
            }, 1000);
        });

        /* THE MASTER DRAMA DATA STRUCTURE */
        const storyTimeline = [
            // CHAPTER 1: THE NAME
            { chTitle: "الفصل الأول: الاسم والضحكة الأرخص", type: "doctor", name: "الدكتور", text: "علي صقر.. اسمك قوي، وفيه هيبة.. بس وأنا بقعد معاك بحس إن الاسم كان دايماً أكبر من صاحبه بسنين.. مش كده؟", asset: "scene-therapy" },
            { chTitle: "الفصل الأول: الاسم والضحكة الأرخص", type: "ali", name: "علي", text: "الناس فاكرة إن القوة في الاسم يا دكتور.. مكانوش يعرفوا إن اللي جوه الصقر ده كان مجرد واحد بيحاول يلاقي مكان يحس فيه إنه كفاية.. مكان يحس فيه إنه دافي ومسموع.", asset: "scene-therapy" },
            { chTitle: "الفصل الأول: الاسم والضحكة الأرخص", type: "doctor", name: "الدكتور", text: "بس الغريبة إنك كنت بتضحك كتير وسطهم.. مكنش باين عليك كل التعب ده.", asset: "scene-therapy" },
            { chTitle: "الفصل الأول: الاسم والضحكة الأرخص", type: "ali", name: "علي", text: "أصل أنا اكتشفت بدري أوي إن الضحكة أرخص بكتير من إنك تقعد تشرح لحد إنك تعبان.. ومين أصلاً في الدنيا دي فاضي يسمعك؟ كل الناس بتحب النهاية وتصقف للبطل.. محدش ليه خلق يسمع أول الفيلم والوجع اللي في البداية.", asset: "scene-therapy" },
            
            // CHAPTER 2: LEFT ARM
            { chTitle: "الفصل الثاني: ذراع الوعود والجلد المخلوع", type: "doctor", name: "الدكتور", text: "أنا شايف ذراعك الشمال كله عبارة عن حكاية ورا حكاية.. مترتبة ورا بعضها كأنها فصول كتاب.. إيه الرموز دي كلها؟", asset: "tattoo-left-1" },
            { chTitle: "الفصل الثاني: ذراع الوعود والجلد المخلوع", type: "ali", name: "علي", text: "ده ترتيب الوجع والوعد يا دكتور. فوق خالص هنا جملة Try for yourself.. وتحتيها علطول عيون مروة مرسومة برياليزم ملوش حل.. رموشها ولمعة الضوء في عينها كأنها شايفاني بجد.", asset: "tattoo-left-1" },
            { chTitle: "الفصل الثاني: ذراع الوعود والجلد المخلوع", type: "ali", name: "علي", text: "العينين دول كانوا الشاهد على بداية التحول، النظرة اللي غيرت نظرتي لنفسي.. وتحت العينين مكتوب and for me.. بس خد بالك، كلمة me باللون الأحمر الصريح.. كأنها قطرة دم نزفت في نهاية الوعد.", asset: "tattoo-left-2" },
            { chTitle: "الفصل الثاني: ذراع الوعود والجلد المخلوع", type: "doctor", name: "الدكتور", text: "والتعبان اللي خارج من قلب كلمة me ولافف على بقية إيدك؟", asset: "tattoo-left-3" },
            { chTitle: "الفصل الثاني: ذراع الوعود والجلد المخلوع", type: "ali", name: "علي", text: "الحية بالنسبة لي هي الكائن الوحيد اللي لما الدنيا بتضيق عليه بيخلع جلده القديم ويكمل.. مبيفلوش ومبيرجعش يلبسه تاني. ودي كانت أول رسالة لنفسي: النسخة القديمة بتاعت زمان.. ماتت ودفنتها هنا.", asset: "tattoo-left-3" },

            // CHAPTER 3: RIGHT ARM
            { chTitle: "الفصل الثالث: فصل الزمن والمخاطرة", type: "doctor", name: "الدكتور", text: "والناحية التانية؟ ذراعك اليمين عليه أرقام وجملة حادة جداً.", asset: "tattoo-right" },
            { chTitle: "الفصل الثالث: فصل الزمن والمخاطرة", type: "ali", name: "علي", text: "هنا فوق خالص التاريخ الروماني II • XIV • MMXXII.. دي مش مجرد أرقام، دي اللحظة اللي الزمن فيها اتقسم نصين.. قبل التاريخ ده كنت شخص، وبعده بقيت شخص تاني خالص.. وتحته علطول قانون اللعبة: No Risk No Story.", asset: "tattoo-right" },
            { chTitle: "الفصل الثالث: فصل الزمن والمخاطرة", type: "ali", name: "علي", text: "لأن الحياة اللي من غير مخاطرة، هتموت من غير ما حد يعرف إنك كنت موجود أصلاً! لو هتقع.. قوم. لو هتخسر.. اتعلم. إنما تعيش مستخبي وخايف في الضل؟ دي مش حياة.. ده انتظار للموت.", asset: "tattoo-right" },

            // CHAPTER 4: NECK & CHEST
            { chTitle: "الفصل الرابع: الدروع والندبات", type: "doctor", name: "الدكتور", text: "طيب والجمل اللي على رقبتك وصدرك؟ حاسسها دروع دفاعية صعبة أوي.", asset: "tattoo-neck-chest" },
            { chTitle: "الفصل الرابع: الدروع والندبات", type: "ali", name: "علي", text: "على رقبتي الشمال مكتوب Never Look Back.. حروفها هادية بس معناها قاسي.. مكتوبة عشان تمنعني ألتفت ورايا.. أكتر حاجة كانت بتكسرني إني كنت كل ما أتقدم خطوة.. أبص ورايا عشرة.. فدي بتثبت راسي لقدام.", asset: "tattoo-neck-chest" },

        let currentStep = 0;
        let lastAsset = "";

        const dialogueBox = document.getElementById("dialogue-box");
        const nextTrigger = document.getElementById("next-trigger");
        const chapterLabel = document.getElementById("chapter-label");
        const visualCanvas = document.getElementById("visual-canvas");
        const mainBook = document.getElementById("main-book");

        nextTrigger.addEventListener("click", () => {
            currentStep++;
            if (currentStep < storyTimeline.length) {
                renderDialogueStep();
            } else {
                triggerFinalOutro();
            }
        });

        function renderDialogueStep() {
            const data = storyTimeline[currentStep];
            
            // Update Chapter Title Header
            chapterLabel.innerText = data.chTitle;

            // Page Flip Visual Check (Trigger transition if asset layout changes)
            if (data.asset !== lastAsset) {
                mainBook.classList.add("page-flip-active");
                setTimeout(() => {
                    updateVisualLeft(data.asset);
                    mainBook.classList.remove("page-flip-active");
                }, 400);
                lastAsset = data.asset;
            }

            // Create and inject Bubble
            const bubble = document.createElement("div");
            bubble.className = `bubble ${data.type}`;
            
            const speaker = document.createElement("span");
            speaker.className = "speaker-name";
            speaker.innerText = data.name;
            
            bubble.appendChild(speaker);
            dialogueBox.appendChild(bubble);

            // Scroll down
            dialogueBox.scrollTop = dialogueBox.scrollHeight;

            // Typewriter effect inside the bubble
            let textIdx = 0;
            bubble.classList.add("reveal");
            
            nextTrigger.style.pointerEvents = "none"; // Disable button during typing
            nextTrigger.style.opacity = "0.5";

            function typeBubbleText() {
                if (textIdx < data.text.length) {
                    // Check for custom styling rules inside quotes or parameters
                    bubble.innerHTML += data.text.charAt(textIdx);
                    textIdx++;
                    dialogueBox.scrollTop = dialogueBox.scrollHeight;
                    setTimeout(typeBubbleText, 25);
                } else {
                    nextTrigger.style.pointerEvents = "auto"; // Re-enable
                    nextTrigger.style.opacity = "1";
                }
            }
            typeBubbleText();
        }

        // TRIGGER OUTRO FINAL PAGE
        function triggerFinalOutro() {
            const outroScreen = document.getElementById("master-outro");
            outroScreen.classList.add("active");

            const finalParagraph = "مش كل اللي بتشوفه من الشخص بيبقى هو الصح..\nومش كل اللي بيطلع من بوقنا بيبقى هو اللي إحنا عاوزين نقوله فعلاً..\nساعات السكوت بيبقى بيعبر عن كل اللي نفسنا نقوله..\n\nوفي النهاية.. كان معكم المريض النفسي.";
            const outroTextContainer = document.getElementById("final-philosophy");
            
            let outroIdx = 0;
            function typeOutroText() {
                if (outroIdx < finalParagraph.length) {
                    let char = finalParagraph.charAt(outroIdx);
                    outroTextContainer.innerHTML += char === "\n" ? "<br>" : char;
                    outroIdx++;
                    setTimeout(typeOutroText, 45);
                } else {
                    document.getElementById("final-signature").style.opacity = "1";

                    outroScreen.style.background = "#050505";

                    outroScreen.appendChild(staticBg);
